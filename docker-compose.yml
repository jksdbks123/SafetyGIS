services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Cache persists on host filesystem across container rebuilds
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/mapillary/token')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
